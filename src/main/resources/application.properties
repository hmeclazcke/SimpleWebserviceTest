spring.application.name=SimpleWebserviceTest

# Enable Java 21+ virtual threads for blocking Spring MVC/JPA request handling
spring.threads.virtual.enabled=true

# In-memory H2 Database
spring.datasource.url=jdbc:h2:mem:accountsdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creates the tables on startup and deletes them at shutdown
spring.jpa.hibernate.ddl-auto=create-drop

# Display SQL in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 web console --> http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:accountsdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Browser / Postman
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false
